<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Add Customer – Pelican Pest Portal</title>
<link rel="stylesheet" href="/styles.css">
<script>window.ENV_SUPABASE_URL='https://ioacpnmzcycimgobjoyi.supabase.co';window.ENV_SUPABASE_KEY='sb_publishable_liX2cpOBGnC7tC6TTbIS1w_eH8WaXbi';</script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<div class="topbar">
  <button class="back-btn" onclick="window.location.href='/dashboard.html'">← Back</button>
  <span class="topbar-title">ADD CUSTOMER</span>
  <div class="user-badge" id="emp-badge">?</div>
</div>
<div class="page-body">
  <div class="card">
    <div class="card-title">👤 CUSTOMER INFORMATION</div>
    <div id="error-box" class="error-box" style="display:none"></div>
    <div class="form-group"><label>Full Name *</label><input type="text" id="f-name" placeholder="e.g. John Smith"></div>
    <div class="form-group"><label>Street Address</label><input type="text" id="f-address" placeholder="123 Main St"></div>
    <div class="row">
      <div class="form-group"><label>City</label><input type="text" id="f-city" placeholder="Baton Rouge"></div>
      <div class="form-group"><label>ZIP</label><input type="text" id="f-zip" placeholder="70801" maxlength="5"></div>
    </div>
    <div class="form-group"><label>Phone</label><input type="tel" id="f-phone" placeholder="225-555-0000"></div>
    <div class="form-group"><label>Email</label><input type="email" id="f-email" placeholder="customer@email.com"></div>
    <div class="form-group"><label>Service Start Date</label><input type="date" id="f-start"></div>
    <div class="form-group"><label>Notes</label><textarea id="f-notes" style="height:70px;resize:none;width:100%;border:1.5px solid var(--gray-200);border-radius:9px;padding:9px 11px;font-family:inherit;font-size:14px" placeholder="Any additional notes..."></textarea></div>
  </div>
  <button class="btn btn-green" id="save-btn" onclick="saveCustomer()">Save Customer →</button>
</div>
<script>
const { createClient } = supabase
const db = createClient(window.ENV_SUPABASE_URL, window.ENV_SUPABASE_KEY)

const employee = JSON.parse(localStorage.getItem('pelican_employee') || 'null')
if (!employee) window.location.href = '/'
document.getElementById('emp-badge').textContent = employee.name[0]

async function saveCustomer() {
  const name = document.getElementById('f-name').value.trim()
  const errBox = document.getElementById('error-box')
  errBox.style.display = 'none'
  if (!name) { errBox.textContent = 'Customer name is required.'; errBox.style.display = 'block'; return }
  const btn = document.getElementById('save-btn')
  btn.textContent = 'Saving...'
  btn.disabled = true
  const { data, error } = await db.from('customers').insert({
    name,
    address: document.getElementById('f-address').value,
    city: document.getElementById('f-city').value || 'Baton Rouge',
    state: 'LA',
    zip: document.getElementById('f-zip').value,
    phone: document.getElementById('f-phone').value,
    email: document.getElementById('f-email').value,
    service_start_date: document.getElementById('f-start').value || null,
    notes: document.getElementById('f-notes').value,
  }).select().single()
  if (error) {
    errBox.textContent = 'Failed to save. Please try again.'
    errBox.style.display = 'block'
    btn.textContent = 'Save Customer →'
    btn.disabled = false
    return
  }
  await db.from('compliance').insert({ customer_id: data.id })
  window.location.href = `/customer.html?id=${data.id}`
}
</script>
</body>
</html>
