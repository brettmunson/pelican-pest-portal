<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Pelican Pest Control – Termite Portal</title>
<link rel="stylesheet" href="/styles.css">
<script>window.ENV_SUPABASE_URL='https://ioacpnmzcycimgobjoyi.supabase.co';window.ENV_SUPABASE_KEY='sb_publishable_liX2cpOBGnC7tC6TTbIS1w_eH8WaXbi';</script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<div class="login-wrap">
  <div class="login-card">
    <div class="login-logo">
      <div style="font-size:48px">🐦</div>
      <h1>Pelican Pest Control</h1>
      <p>Termite Documentation Portal</p>
    </div>
    <div id="error-box" class="error-box" style="display:none"></div>
    <div class="form-group">
      <label>Your Name</label>
      <select id="emp-select">
        <option value="">— Select your name —</option>
      </select>
    </div>
    <div class="form-group">
      <label>PIN</label>
      <input type="password" id="pin-input" placeholder="Enter your PIN" maxlength="6">
    </div>
    <button class="btn btn-primary mt-12" onclick="doLogin()">Sign In →</button>
    <p style="text-align:center;font-size:12px;color:var(--gray-400);margin-top:14px">Pelican Pest Control · 225-424-2623</p>
  </div>
</div>
<script>
const { createClient } = supabase
const db = createClient(window.ENV_SUPABASE_URL, window.ENV_SUPABASE_KEY)

const existing = localStorage.getItem('pelican_employee')
if (existing) window.location.href = '/dashboard.html'

async function loadEmployees() {
  const { data } = await db.from('employees').select('id,name,role').eq('active', true).order('name')
  const sel = document.getElementById('emp-select')
  if (data) data.forEach(e => {
    const opt = document.createElement('option')
    opt.value = e.id
    opt.textContent = e.name
    sel.appendChild(opt)
  })
}
loadEmployees()

document.getElementById('pin-input').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin() })

async function doLogin() {
  const empId = document.getElementById('emp-select').value
  const pin = document.getElementById('pin-input').value
  const errBox = document.getElementById('error-box')
  errBox.style.display = 'none'
  if (!empId) { errBox.textContent = 'Please select your name.'; errBox.style.display = 'block'; return }
  if (!pin) { errBox.textContent = 'Please enter your PIN.'; errBox.style.display = 'block'; return }
  const btn = event.target
  btn.textContent = 'Signing in...'
  btn.disabled = true
  const { data, error } = await db.from('employees').select('*').eq('id', empId).eq('pin', pin).eq('active', true).single()
  if (error || !data) {
    errBox.textContent = 'Incorrect PIN. Please try again.'
    errBox.style.display = 'block'
    btn.textContent = 'Sign In →'
    btn.disabled = false
    return
  }
  localStorage.setItem('pelican_employee', JSON.stringify(data))
  window.location.href = '/dashboard.html'
}
</script>
</body>
</html>
